<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ACT Overlay — CombatData Viewer</title>
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>
  <header>
    <h1>ACT Overlay - CombatData Viewer</h1>
    <div id="status">Initializing…</div>
  </header>
  <div id="controls">
    <button id="btn-start">Start</button>
    <button id="btn-stop">Stop</button>
    <select id="url-select">
      <option>ws://127.0.0.1:10501</option>
      <option>ws://127.0.0.1:10501/ws</option>
    </select>
  </div>
  <main id="container">
    <section id="panel-dps" class="panel">
      <h2>Party DPS</h2>
      <div id="dps-list" class="dps-list">No data yet</div>
    </section>
  </main>
  <script src="overlay.js"></script>
</body>
</html>
